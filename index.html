<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minesweeper Pro</title>
    <style>
        :root {
            --bg-color: #aad751;
            --bg-alt: #a2d149;
            --revealed-bg: #e5c29f;
            --revealed-alt: #d7b899;
            /* 19 cols, 10 rows. Subtracting UI space for the header */
            --cell-size: calc(min(100vw / 19, (100vh - 80px) / 10));
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* Critical: Disables browser-level gestures */
        }

        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #4a752c;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #header {
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #4a752c;
            color: white;
            z-index: 10;
        }

        #msg { font-weight: bold; font-size: 1.2rem; }

        #restart-btn {
            padding: 8px 16px;
            background: #aad751;
            border: none;
            color: #4a752c;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        #game-container {
            width: 100vw;
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(19, var(--cell-size));
            grid-template-rows: repeat(10, var(--cell-size));
            background: #4a752c;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: calc(var(--cell-size) * 0.6);
        }

        .light { background-color: var(--bg-color); }
        .dark { background-color: var(--bg-alt); }
        .revealed.light { background-color: var(--revealed-bg); }
        .revealed.dark { background-color: var(--revealed-alt); }

        @keyframes break {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }
        .digging { animation: break 0.15s ease-out; }

        .cell.flagged::after { content: '🚩'; font-size: 0.7em; }
        .cell.mine::after { content: '💣'; }

        .n1 { color: #1976d2; } .n2 { color: #388e3c; } .n3 { color: #d32f2f; }
        .n4 { color: #7b1fa2; }

        /* Square Interaction Menu */
        #action-menu {
            position: absolute;
            display: none;
            z-index: 1000;
            pointer-events: none;
        }

        .menu-btn {
            position: absolute;
            width: var(--cell-size);
            height: var(--cell-size);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: auto;
            font-size: calc(var(--cell-size) * 0.6);
            border: 2px solid #4a752c;
        }

        /* Always offset by exactly one square */
        #btn-dig { top: calc(var(--cell-size) * -1); left: 0; }
        #btn-flag { top: 0; left: calc(var(--cell-size) * -1); }
    </style>
</head>
<body>

    <div id="header">
        <span id="msg">MINESWEEPER</span>
        <button id="restart-btn" onclick="initGame()">RESTART</button>
    </div>
    
    <div id="game-container">
        <div id="grid"></div>
        <div id="action-menu">
            <div id="btn-dig" class="menu-btn">⛏️</div>
            <div id="btn-flag" class="menu-btn">🚩</div>
        </div>
    </div>

<script>
    // Prevent double-tap zoom on iOS/Chrome mobile
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTapTime <= 300) e.preventDefault();
        lastTapTime = now;
    }, { passive: false });

    const ROWS = 10;
    const COLS = 19;
    const MINES = 35;
    
    let board = [];
    let gameOver = false;
    let minesGenerated = false;
    let selectedCell = null;
    let lastTapTime = 0;

    const gridEl = document.getElementById('grid');
    const menuEl = document.getElementById('action-menu');
    const msgEl = document.getElementById('msg');

    function initGame() {
        board = [];
        gameOver = false;
        minesGenerated = false;
        gridEl.innerHTML = '';
        msgEl.innerText = "MINESWEEPER";
        menuEl.style.display = 'none';
        
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                const cellEl = document.createElement('div');
                cellEl.classList.add('cell', (r + c) % 2 === 0 ? 'light' : 'dark');
                cellEl.addEventListener('pointerup', (e) => handleTap(e, r, c));
                board[r][c] = { r, c, isMine: false, revealed: false, flagged: false, neighborCount: 0, el: cellEl };
                gridEl.appendChild(cellEl);
            }
        }
    }

    function generateMines(safeR, safeC) {
        let placed = 0;
        while (placed < MINES) {
            let r = Math.floor(Math.random() * ROWS);
            let c = Math.floor(Math.random() * COLS);
            if (!board[r][c].isMine && (Math.abs(r - safeR) > 1 || Math.abs(c - safeC) > 1)) {
                board[r][c].isMine = true;
                placed++;
            }
        }
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) continue;
                let count = 0;
                iterateNeighbors(r, c, (nr, nc) => { if (board[nr][nc].isMine) count++; });
                board[r][c].neighborCount = count;
            }
        }
        minesGenerated = true;
    }

    function handleTap(e, r, c) {
        if (gameOver) return;
        const cell = board[r][c];
        const now = Date.now();

        // Chording on double-tap of revealed cell
        if (now - lastTapTime < 300 && cell.revealed) {
            handleChord(r, c);
            return;
        }

        if (!minesGenerated) {
            generateMines(r, c);
            dig(r, c);
            return;
        }

        if (cell.flagged) {
            toggleFlag(r, c);
            menuEl.style.display = 'none';
            return;
        }

        if (cell.revealed) return;

        selectedCell = cell;
        menuEl.style.display = 'block';
        // Position menu directly over the cell so children (btns) offset correctly
        menuEl.style.top = (r * cell.el.offsetHeight) + 'px';
        menuEl.style.left = (c * cell.el.offsetWidth) + 'px';
    }

    function dig(r, c) {
        const cell = board[r][c];
        if (cell.revealed || cell.flagged || gameOver) return;
        cell.revealed = true;
        cell.el.classList.add('revealed', 'digging');
        setTimeout(() => cell.el.classList.remove('digging'), 150);

        if (cell.isMine) return endGame(false);

        if (cell.neighborCount > 0) {
            cell.el.innerText = cell.neighborCount;
            cell.el.classList.add('n' + cell.neighborCount);
        } else {
            iterateNeighbors(r, c, (nr, nc) => dig(nr, nc));
        }
        checkWin();
    }

    function toggleFlag(r, c) {
        const cell = board[r][c];
        cell.flagged = !cell.flagged;
        cell.el.classList.toggle('flagged');
    }

    function handleChord(r, c) {
        const cell = board[r][c];
        let flags = 0;
        iterateNeighbors(r, c, (nr, nc) => { if (board[nr][nc].flagged) flags++; });
        if (flags === cell.neighborCount) {
            iterateNeighbors(r, c, (nr, nc) => { if (!board[nr][nc].flagged) dig(nr, nc); });
        }
    }

    function iterateNeighbors(r, c, cb) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                let nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) cb(nr, nc);
            }
        }
    }

    function checkWin() {
        let revealed = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) if (board[r][c].revealed) revealed++;
        }
        if (revealed === (ROWS * COLS) - MINES) endGame(true);
    }

    function endGame(won) {
        gameOver = true;
        msgEl.innerText = won ? "WINNER! 🎉" : "BOOM! 💥";
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) board[r][c].el.classList.add('mine', 'revealed');
            }
        }
    }

    document.getElementById('btn-dig').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) dig(selectedCell.r, selectedCell.c);
        menuEl.style.display = 'none';
    };

    document.getElementById('btn-flag').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) toggleFlag(selectedCell.r, selectedCell.c);
        menuEl.style.display = 'none';
    };

    window.addEventListener('pointerdown', (e) => {
        if (!menuEl.contains(e.target) && !e.target.classList.contains('cell')) {
            menuEl.style.display = 'none';
        }
    });

    initGame();
</script>
</body>
</html>
