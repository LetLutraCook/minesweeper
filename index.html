<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Mobile</title>
    <style>
        :root {
            --bg-color: #aad751;
            --bg-alt: #a2d149;
            --revealed-bg: #e5c29f;
            --revealed-alt: #d7b899;
            /* Dynamic cell size based on screen width/height */
            --cell-size: calc(min(98vw / 19, 85vh / 10));
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* Prevents scrolling/zooming during play */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #4a752c;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #status-bar {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #4a752c;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 10;
        }

        #game-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(19, var(--cell-size));
            grid-template-rows: repeat(10, var(--cell-size));
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 4px solid #4a752c;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: calc(var(--cell-size) * 0.6);
            cursor: pointer;
        }

        .cell.light { background-color: var(--bg-color); }
        .cell.dark { background-color: var(--bg-alt); }
        .cell.revealed.light { background-color: var(--revealed-bg); }
        .cell.revealed.dark { background-color: var(--revealed-alt); }

        .cell.flagged::after { content: '🚩'; font-size: 0.7em; }
        .cell.mine::after { content: '💣'; font-size: 0.7em; }

        .n1 { color: #1976d2; } .n2 { color: #388e3c; } .n3 { color: #d32f2f; }
        .n4 { color: #7b1fa2; } .n5 { color: #ff8f00; }

        /* Mobile Interaction Menu */
        #action-menu {
            position: absolute;
            display: none;
            z-index: 1000;
            pointer-events: none;
        }

        .menu-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            font-size: 24px;
            transition: transform 0.05s;
        }

        .menu-btn:active { transform: scale(1.2); }

        /* Specific positions requested */
        #btn-dig { bottom: 20px; left: -25px; } /* Above where finger is */
        #btn-flag { top: -25px; right: 20px; } /* To the left of where finger is */

    </style>
</head>
<body oncontextmenu="return false;">

    <div id="status-bar">Minesweeper</div>
    
    <div id="game-container">
        <div id="grid"></div>
        
        <div id="action-menu">
            <div id="btn-dig" class="menu-btn">⛏️</div>
            <div id="btn-flag" class="menu-btn">🚩</div>
        </div>
    </div>

<script>
    const ROWS = 10;
    const COLS = 19;
    const MINES = 35;
    
    let board = [];
    let gameOver = false;
    let selectedCell = null;
    let lastTapTime = 0;

    const gridEl = document.getElementById('grid');
    const menuEl = document.getElementById('action-menu');
    const statusEl = document.getElementById('status-bar');

    function initGame() {
        board = [];
        gameOver = false;
        gridEl.innerHTML = '';
        statusEl.innerText = "Minesweeper";
        
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                board[r][c] = { r, c, isMine: false, revealed: false, flagged: false, neighborCount: 0, el: null };
            }
        }

        let minesPlaced = 0;
        while (minesPlaced < MINES) {
            let r = Math.floor(Math.random() * ROWS);
            let c = Math.floor(Math.random() * COLS);
            if (!board[r][c].isMine) {
                board[r][c].isMine = true;
                minesPlaced++;
            }
        }

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) continue;
                let count = 0;
                iterateNeighbors(r, c, (nr, nc) => { if (board[nr][nc].isMine) count++; });
                board[r][c].neighborCount = count;
            }
        }

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cellEl = document.createElement('div');
                cellEl.classList.add('cell', (r + c) % 2 === 0 ? 'light' : 'dark');
                
                // Using pointerup for "Instant" response on mobile
                cellEl.addEventListener('pointerup', (e) => handleInteraction(e, r, c));
                
                board[r][c].el = cellEl;
                gridEl.appendChild(cellEl);
            }
        }
    }

    function iterateNeighbors(r, c, callback) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                let nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) callback(nr, nc);
            }
        }
    }

    function handleInteraction(e, r, c) {
        if (gameOver) return;
        const cell = board[r][c];
        const now = Date.now();

        // Handle Double Tap (Chord) logic
        if (now - lastTapTime < 300 && cell.revealed) {
            handleChord(r, c);
            lastTapTime = 0;
            return;
        }
        lastTapTime = now;

        // Auto-remove flag if tapped
        if (cell.flagged) {
            toggleFlag(r, c);
            menuEl.style.display = 'none';
            return;
        }

        if (cell.revealed) return;

        // Positioning logic: use event coordinates for accuracy
        selectedCell = cell;
        menuEl.style.display = 'block';
        menuEl.style.top = e.clientY + 'px';
        menuEl.style.left = e.clientX + 'px';
    }

    document.getElementById('btn-dig').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) dig(selectedCell.r, selectedCell.c);
        menuEl.style.display = 'none';
    };

    document.getElementById('btn-flag').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) toggleFlag(selectedCell.r, selectedCell.c);
        menuEl.style.display = 'none';
    };

    function dig(r, c) {
        const cell = board[r][c];
        if (cell.revealed || cell.flagged || gameOver) return;

        cell.revealed = true;
        cell.el.classList.add('revealed');

        if (cell.isMine) {
            endGame(false);
            return;
        }

        if (cell.neighborCount > 0) {
            cell.el.innerText = cell.neighborCount;
            cell.el.classList.add('n' + cell.neighborCount);
        } else {
            iterateNeighbors(r, c, (nr, nc) => dig(nr, nc));
        }
        checkWin();
    }

    function toggleFlag(r, c) {
        const cell = board[r][c];
        cell.flagged = !cell.flagged;
        cell.el.classList.toggle('flagged');
    }

    function handleChord(r, c) {
        const cell = board[r][c];
        let flagCount = 0;
        iterateNeighbors(r, c, (nr, nc) => { if (board[nr][nc].flagged) flagCount++; });

        if (flagCount === cell.neighborCount) {
            iterateNeighbors(r, c, (nr, nc) => { if (!board[nr][nc].flagged) dig(nr, nc); });
        }
    }

    function checkWin() {
        let revealedCount = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) if (board[r][c].revealed) revealedCount++;
        }
        if (revealedCount === (ROWS * COLS) - MINES) endGame(true);
    }

    function endGame(won) {
        gameOver = true;
        statusEl.innerText = won ? "YOU WIN! 🎉" : "GAME OVER! 💥";
        statusEl.style.color = won ? "#fff" : "#ff4444";
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) {
                    board[r][c].el.classList.add('mine', 'revealed');
                }
            }
        }
    }

    // Close menu on backdrop tap
    window.addEventListener('pointerdown', (e) => {
        if (!menuEl.contains(e.target) && !e.target.classList.contains('cell')) {
            menuEl.style.display = 'none';
        }
    });

    initGame();
</script>
</body>
</html>
