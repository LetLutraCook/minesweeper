<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>minesweeper</title>
    <style>
        :root {
            --bg-color: #aad751;
            --bg-alt: #a2d149;
            --revealed-bg: #e5c29f;
            --revealed-alt: #d7b899;
            --border-color: #4a752c;
            --cell-size: calc(min(90vw / 19, (85vh - 60px) / 10));
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none !important; 
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            background-color: var(--border-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }

        #header {
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        #game-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #grid-border {
            padding: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(19, var(--cell-size));
            grid-template-rows: repeat(10, var(--cell-size));
            position: relative;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: calc(var(--cell-size) * 0.6);
            overflow: visible;
        }

        .dirt {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .dirt.light { background-color: var(--revealed-bg); }
        .dirt.dark { background-color: var(--revealed-alt); }

        .grass {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 5;
            transition: transform 0.3s cubic-bezier(0.4, 0, 1, 1), opacity 0.3s;
            transform-origin: center;
        }
        .grass.light { background-color: var(--bg-color); }
        .grass.dark { background-color: var(--bg-alt); }

        .popped {
            transform: scale(0) translateY(20px);
            opacity: 0;
            pointer-events: none;
        }

        .cell.selected {
            outline: 3px solid white;
            outline-offset: -3px;
            z-index: 10;
        }

        .content { z-index: 2; pointer-events: none; }
        .flagged-icon { position: absolute; z-index: 6; pointer-events: none; font-size: 0.7em; }
        .mine-icon { z-index: 3; pointer-events: none; }

        .n1 { color: #1976d2; } .n2 { color: #388e3c; } .n3 { color: #d32f2f; }
        .n4 { color: #7b1fa2; }

        #action-menu {
            position: absolute;
            display: none;
            z-index: 1000;
            width: var(--cell-size);
            height: var(--cell-size);
            pointer-events: none;
        }

        .menu-btn {
            position: absolute;
            width: var(--cell-size);
            height: var(--cell-size);
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: calc(var(--cell-size) * 0.6);
            border-radius: 50%;
            border: 2px solid white;
            pointer-events: auto;
        }

        #btn-dig { top: calc(var(--cell-size) * -1.2); left: 0; }
        #btn-flag { top: 0; left: calc(var(--cell-size) * -1.2); }

        #restart-btn {
            padding: 8px 16px;
            background: var(--bg-color);
            border: none;
            border-radius: 4px;
            color: var(--border-color);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="header">
        <span id="msg">minesweeper</span>
        <button id="restart-btn" onclick="initGame()">RESTART</button>
    </div>
    
    <div id="game-container">
        <div id="grid-border">
            <div id="grid"></div>
        </div>
        <div id="action-menu">
            <div id="btn-dig" class="menu-btn">⛏️</div>
            <div id="btn-flag" class="menu-btn">🚩</div>
        </div>
    </div>

<script>
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('dblclick', e => e.preventDefault());

    const ROWS = 10;
    const COLS = 19;
    const MINES = 35;
    
    let board = [];
    let gameOver = false;
    let minesGenerated = false;
    let selectedCell = null;
    let lastTap = 0;

    const gridEl = document.getElementById('grid');
    const menuEl = document.getElementById('action-menu');

    function initGame() {
        board = [];
        gameOver = false;
        minesGenerated = false;
        gridEl.innerHTML = '';
        menuEl.style.display = 'none';
        selectedCell = null;
        document.getElementById('msg').innerText = "minesweeper";
        
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                const container = document.createElement('div');
                container.classList.add('cell');
                
                const dirt = document.createElement('div');
                dirt.classList.add('dirt', (r+c)%2===0 ? 'light' : 'dark');
                
                const grass = document.createElement('div');
                grass.classList.add('grass', (r+c)%2===0 ? 'light' : 'dark');
                
                const content = document.createElement('div');
                content.classList.add('content');

                container.appendChild(dirt);
                container.appendChild(grass);
                container.appendChild(content);

                container.addEventListener('pointerup', (e) => handleTap(e, r, c));
                
                board[r][c] = { 
                    r, c, 
                    isMine: false, 
                    revealed: false, 
                    flagged: false, 
                    neighborCount: 0, 
                    el: container, 
                    grass, 
                    content,
                    flagEl: null
                };
                gridEl.appendChild(container);
            }
        }
    }

    function generateMines(sr, sc) {
        let p = 0;
        while (p < MINES) {
            let r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
            if (!board[r][c].isMine && (Math.abs(r-sr)>1 || Math.abs(c-sc)>1)) {
                board[r][c].isMine = true; p++;
            }
        }
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) continue;
                let n = 0;
                iterate(r, c, (nr, nc) => { if (board[nr][nc].isMine) n++; });
                board[r][c].neighborCount = n;
            }
        }
        minesGenerated = true;
    }

    function handleTap(e, r, c) {
        if (gameOver) return;
        const cell = board[r][c];
        const now = Date.now();

        if (now - lastTap < 300 && cell.revealed) {
            handleChord(r, c);
            return;
        }
        lastTap = now;

        if (!minesGenerated) {
            generateMines(r, c);
            dig(r, c);
            return;
        }

        if (cell.flagged) {
            toggleFlag(r, c);
            clearSelection();
            return;
        }

        if (cell.revealed) return;

        if (selectedCell) selectedCell.el.classList.remove('selected');
        selectedCell = cell;
        cell.el.classList.add('selected');

        menuEl.style.display = 'block';
        const rect = gridEl.getBoundingClientRect();
        menuEl.style.top = (r * cell.el.offsetHeight) + 'px';
        menuEl.style.left = (c * cell.el.offsetWidth) + 'px';
    }

    function clearSelection() {
        if (selectedCell) selectedCell.el.classList.remove('selected');
        selectedCell = null;
        menuEl.style.display = 'none';
    }

    function dig(r, c) {
        const cell = board[r][c];
        if (cell.revealed || cell.flagged || gameOver) return;
        
        cell.revealed = true;
        cell.grass.classList.add('popped');

        if (cell.isMine) return endGame(false);

        if (cell.neighborCount > 0) {
            cell.content.innerText = cell.neighborCount;
            cell.content.classList.add('n' + cell.neighborCount);
        } else {
            iterate(r, c, (nr, nc) => dig(nr, nc));
        }
        checkWin();
    }

    function toggleFlag(r, c) {
        const cell = board[r][c];
        if (cell.revealed) return;
        cell.flagged = !cell.flagged;
        if (cell.flagged) {
            const f = document.createElement('div');
            f.classList.add('flagged-icon');
            f.innerText = '🚩';
            cell.el.appendChild(f);
            cell.flagEl = f;
        } else if (cell.flagEl) {
            cell.flagEl.remove();
            cell.flagEl = null;
        }
    }

    function handleChord(r, c) {
        const cell = board[r][c];
        let f = 0;
        iterate(r, c, (nr, nc) => { if (board[nr][nc].flagged) f++; });
        if (f === cell.neighborCount) {
            iterate(r, c, (nr, nc) => { if (!board[nr][nc].flagged) dig(nr, nc); });
        }
    }

    function iterate(r, c, cb) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                let nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) cb(nr, nc);
            }
        }
    }

    function checkWin() {
        let rev = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) if (board[r][c].revealed) rev++;
        }
        if (rev === (ROWS * COLS) - MINES) endGame(true);
    }

    function endGame(won) {
        gameOver = true;
        clearSelection();
        document.getElementById('msg').innerText = won ? "WIN! 🎉" : "BOOM! 💥";
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) {
                    board[r][c].grass.classList.add('popped');
                    board[r][c].content.innerText = '💣';
                    board[r][c].content.classList.add('mine-icon');
                }
            }
        }
    }

    document.getElementById('btn-dig').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) {
            const r = selectedCell.r, c = selectedCell.c;
            clearSelection();
            dig(r, c);
        }
    };

    document.getElementById('btn-flag').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) {
            const r = selectedCell.r, c = selectedCell.c;
            toggleFlag(r, c);
            clearSelection();
        }
    };

    window.addEventListener('pointerdown', (e) => {
        if (!menuEl.contains(e.target) && !e.target.closest('.cell')) {
            clearSelection();
        }
    });

    initGame();
</script>
</body>
</html>
