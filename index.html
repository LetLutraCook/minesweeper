<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Ultra</title>
    <style>
        :root {
            --bg-color: #aad751;
            --bg-alt: #a2d149;
            --revealed-bg: #e5c29f;
            --revealed-alt: #d7b899;
            --cell-size: calc(min(95vw / 19, 80vh / 10));
        }

        /* HARD DISABLE for scrolling and zooming */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            background-color: #4a752c;
            font-family: 'Roboto', sans-serif;
        }

        #status-bar {
            height: 15vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.8rem;
            font-weight: 800;
        }

        #game-container {
            width: 100vw;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(19, var(--cell-size));
            grid-template-rows: repeat(10, var(--cell-size));
            border: 4px solid #4a752c;
            border-radius: 4px;
            background: #4a752c;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: calc(var(--cell-size) * 0.5);
            transition: background-color 0.1s;
            position: relative;
        }

        /* Grid Colors */
        .light { background-color: var(--bg-color); }
        .dark { background-color: var(--bg-alt); }
        .revealed.light { background-color: var(--revealed-bg); }
        .revealed.dark { background-color: var(--revealed-alt); }

        /* Dirt Breaking Effect */
        @keyframes breakDirt {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); filter: brightness(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .digging { animation: breakDirt 0.2s ease-out; }

        .cell.flagged::after { content: '🚩'; font-size: 0.7em; }
        .cell.mine::after { content: '💣'; }

        /* Numbers */
        .n1 { color: #1976d2; } .n2 { color: #388e3c; } .n3 { color: #d32f2f; }
        .n4 { color: #7b1fa2; } .n5 { color: #ff8f00; }

        /* Interaction Menu */
        #action-menu {
            position: absolute;
            display: none;
            z-index: 1000;
            pointer-events: none;
        }

        .menu-btn {
            position: absolute;
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            pointer-events: auto;
            font-size: 24px;
        }

        #btn-dig { bottom: 15px; left: -27px; } /* Above touch point */
        #btn-flag { top: -27px; right: 15px; } /* Left of touch point */
        
        #restart-btn {
            margin-top: 10px;
            padding: 5px 15px;
            background: #aad751;
            border: none;
            border-radius: 5px;
            color: #4a752c;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="status-bar">
        <span id="msg">Minesweeper</span>
        <button id="restart-btn" onclick="initGame()">RESTART</button>
    </div>
    
    <div id="game-container">
        <div id="grid"></div>
        <div id="action-menu">
            <div id="btn-dig" class="menu-btn">⛏️</div>
            <div id="btn-flag" class="menu-btn">🚩</div>
        </div>
    </div>

<script>
    const ROWS = 10;
    const COLS = 19;
    const MINES = 35;
    
    let board = [];
    let gameOver = false;
    let minesGenerated = false;
    let selectedCell = null;
    let lastTapTime = 0;

    const gridEl = document.getElementById('grid');
    const menuEl = document.getElementById('action-menu');
    const msgEl = document.getElementById('msg');

    function initGame() {
        board = [];
        gameOver = false;
        minesGenerated = false;
        gridEl.innerHTML = '';
        msgEl.innerText = "Minesweeper";
        msgEl.style.color = "white";
        
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                const cellEl = document.createElement('div');
                cellEl.classList.add('cell', (r + c) % 2 === 0 ? 'light' : 'dark');
                
                cellEl.addEventListener('pointerup', (e) => handleInteraction(e, r, c));
                
                board[r][c] = { r, c, isMine: false, revealed: false, flagged: false, neighborCount: 0, el: cellEl };
                gridEl.appendChild(cellEl);
            }
        }
    }

    function generateMines(safeR, safeC) {
        let placed = 0;
        while (placed < MINES) {
            let r = Math.floor(Math.random() * ROWS);
            let c = Math.floor(Math.random() * COLS);
            
            // Ensure mine is not on first click OR any neighbor of first click
            let distR = Math.abs(r - safeR);
            let distC = Math.abs(c - safeC);
            
            if (!board[r][c].isMine && (distR > 1 || distC > 1)) {
                board[r][c].isMine = true;
                placed++;
            }
        }

        // Calculate counts
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) continue;
                let count = 0;
                iterateNeighbors(r, c, (nr, nc) => { if (board[nr][nc].isMine) count++; });
                board[r][c].neighborCount = count;
            }
        }
        minesGenerated = true;
    }

    function handleInteraction(e, r, c) {
        if (gameOver) return;
        const cell = board[r][c];
        const now = Date.now();

        // Chording logic (double tap on revealed number)
        if (now - lastTapTime < 300 && cell.revealed) {
            handleChord(r, c);
            lastTapTime = 0;
            return;
        }
        lastTapTime = now;

        // Requirement: First click always digs automatically and clears an area
        if (!minesGenerated) {
            generateMines(r, c);
            dig(r, c);
            return;
        }

        if (cell.flagged) {
            toggleFlag(r, c);
            menuEl.style.display = 'none';
            return;
        }

        if (cell.revealed) return;

        // Show Menu for subsequent clicks
        selectedCell = cell;
        menuEl.style.display = 'block';
        menuEl.style.top = e.clientY + 'px';
        menuEl.style.left = e.clientX + 'px';
    }

    function dig(r, c) {
        const cell = board[r][c];
        if (cell.revealed || cell.flagged || gameOver) return;

        cell.revealed = true;
        cell.el.classList.add('revealed', 'digging');
        
        // Remove 'digging' class after animation so it can be re-triggered
        setTimeout(() => cell.el.classList.remove('digging'), 200);

        if (cell.isMine) {
            endGame(false);
            return;
        }

        if (cell.neighborCount > 0) {
            cell.el.innerText = cell.neighborCount;
            cell.el.classList.add('n' + cell.neighborCount);
        } else {
            iterateNeighbors(r, c, (nr, nc) => dig(nr, nc));
        }
        checkWin();
    }

    function toggleFlag(r, c) {
        const cell = board[r][c];
        cell.flagged = !cell.flagged;
        cell.el.classList.toggle('flagged');
    }

    function handleChord(r, c) {
        const cell = board[r][c];
        let flags = 0;
        iterateNeighbors(r, c, (nr, nc) => { if (board[nr][nc].flagged) flags++; });
        if (flags === cell.neighborCount) {
            iterateNeighbors(r, c, (nr, nc) => { if (!board[nr][nc].flagged) dig(nr, nc); });
        }
    }

    function iterateNeighbors(r, c, cb) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                let nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) cb(nr, nc);
            }
        }
    }

    function checkWin() {
        let revealed = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) if (board[r][c].revealed) revealed++;
        }
        if (revealed === (ROWS * COLS) - MINES) endGame(true);
    }

    function endGame(won) {
        gameOver = true;
        msgEl.innerText = won ? "YOU WIN! 🎉" : "GAME OVER! 💥";
        msgEl.style.color = won ? "#fff" : "#ff4444";
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) board[r][c].el.classList.add('mine', 'revealed');
            }
        }
    }

    document.getElementById('btn-dig').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) dig(selectedCell.r, selectedCell.c);
        menuEl.style.display = 'none';
    };

    document.getElementById('btn-flag').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) toggleFlag(selectedCell.r, selectedCell.c);
        menuEl.style.display = 'none';
    };

    // Close menu on background click
    window.addEventListener('pointerdown', (e) => {
        if (!menuEl.contains(e.target) && !e.target.classList.contains('cell')) {
            menuEl.style.display = 'none';
        }
    });

    initGame();
</script>
</body>
</html>
