<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        :root {
            --bg-color: #4a752c;
            --header-color: #4a752c;
            --tile-light: #aad751;
            --tile-dark: #a2d149;
            --tile-empty-light: #e5c29f;
            --tile-empty-dark: #d7b899;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: white;
            user-select: none;
        }

        .game-container {
            background-color: #578a34;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background-color: var(--header-color);
            margin-bottom: 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .board {
            display: grid;
            border: 5px solid #578a34;
            background-color: #578a34;
        }

        .tile {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            font-size: 18px;
        }

        /* Checkered pattern for unrevealed tiles */
        .tile.unrevealed-light { background-color: var(--tile-light); }
        .tile.unrevealed-dark { background-color: var(--tile-dark); }
        
        /* Checkered pattern for revealed tiles */
        .tile.revealed-light { background-color: var(--tile-empty-light); }
        .tile.revealed-dark { background-color: var(--tile-empty-dark); }

        .tile.flagged::after { content: "🚩"; font-size: 14px; }
        .tile.mine { background-color: #d32f2f !important; }
        .tile.mine::after { content: "💣"; }

        /* Number colors */
        .n1 { color: #1976d2; } .n2 { color: #388e3c; } .n3 { color: #d32f2f; }
        .n4 { color: #7b1fa2; } .n5 { color: #ff8f00; } .n6 { color: #0097a7; }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: white;
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background: #eee; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="stats-bar">
            <span>🚩 <span id="mine-count">0</span></span>
            <span>⏱️ <span id="timer">0</span></span>
        </div>
        <div id="board" class="board"></div>
    </div>

    <div class="controls">
        <button onclick="startGame('easy')">Easy</button>
        <button onclick="startGame('medium')">Medium</button>
        <button onclick="startGame('hard')">Hard</button>
    </div>

    <script>
        const configs = {
            easy: { rows: 8, cols: 10, mines: 10 },
            medium: { rows: 14, cols: 18, mines: 40 },
            hard: { rows: 20, cols: 24, mines: 99 }
        };

        let currentConfig, board, revealedCount, flags, gameOver, firstClick, timerInterval, seconds;

        function startGame(difficulty) {
            currentConfig = configs[difficulty];
            board = [];
            revealedCount = 0;
            flags = new Set();
            gameOver = false;
            firstClick = true;
            seconds = 0;
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = 0;
            document.getElementById('mine-count').innerText = currentConfig.mines;
            
            initBoard();
        }

        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            boardEl.style.gridTemplateColumns = `repeat(${currentConfig.cols}, 30px)`;

            for (let r = 0; r < currentConfig.rows; r++) {
                board[r] = [];
                for (let c = 0; c < currentConfig.cols; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    // Google-style checkered pattern
                    tile.classList.add((r + c) % 2 === 0 ? 'unrevealed-light' : 'unrevealed-dark');
                    
                    tile.addEventListener('click', () => handleLeftClick(r, c));
                    tile.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });

                    boardEl.appendChild(tile);
                    board[r][c] = { isMine: false, revealed: false, count: 0, element: tile };
                }
            }
        }

        function placeMines(startR, startC) {
            let minesPlaced = 0;
            while (minesPlaced < currentConfig.mines) {
                let r = Math.floor(Math.random() * currentConfig.rows);
                let c = Math.floor(Math.random() * currentConfig.cols);

                // First-click safety: Ensure mine is not on or adjacent to first click
                const isSafeZone = Math.abs(r - startR) <= 1 && Math.abs(c - startC) <= 1;

                if (!board[r][c].isMine && !isSafeZone) {
                    board[r][c].isMine = true;
                    minesPlaced++;
                }
            }

            // Calculate numbers
            for (let r = 0; r < currentConfig.rows; r++) {
                for (let c = 0; c < currentConfig.cols; c++) {
                    if (!board[r][c].isMine) {
                        board[r][c].count = getNeighbors(r, c).filter(n => n.isMine).length;
                    }
                }
            }
        }

        function handleLeftClick(r, c) {
            if (gameOver || flags.has(`${r},${c}`)) return;

            if (firstClick) {
                placeMines(r, c);
                firstClick = false;
                startTimer();
            }

            const tile = board[r][c];
            if (tile.isMine) {
                revealMines();
                alert("Game Over!");
                gameOver = true;
                clearInterval(timerInterval);
                return;
            }

            revealTile(r, c);
            checkWin();
        }

        function revealTile(r, c) {
            const tile = board[r][c];
            if (tile.revealed) return;

            tile.revealed = true;
            revealedCount++;
            
            // Update Visuals
            tile.element.classList.remove('unrevealed-light', 'unrevealed-dark');
            tile.element.classList.add((r + c) % 2 === 0 ? 'revealed-light' : 'revealed-dark');

            if (tile.count > 0) {
                tile.element.innerText = tile.count;
                tile.element.classList.add(`n${tile.count}`);
            } else {
                // Cascade for zero
                getNeighbors(r, c).forEach(n => revealTile(n.r, n.c));
            }
        }

        function handleRightClick(r, c) {
            if (gameOver || board[r][c].revealed) return;
            const key = `${r},${c}`;
            if (flags.has(key)) {
                flags.delete(key);
                board[r][c].element.classList.remove('flagged');
            } else {
                flags.add(key);
                board[r][c].element.classList.add('flagged');
            }
            document.getElementById('mine-count').innerText = currentConfig.mines - flags.size;
        }

        function getNeighbors(r, c) {
            const neighbors = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < currentConfig.rows && nc >= 0 && nc < currentConfig.cols && (dr !== 0 || dc !== 0)) {
                        neighbors.push({ ...board[nr][nc], r: nr, c: nc });
                    }
                }
            }
            return neighbors;
        }

        function revealMines() {
            board.flat().forEach(tile => {
                if (tile.isMine) tile.element.classList.add('mine');
            });
        }

        function checkWin() {
            if (revealedCount === (currentConfig.rows * currentConfig.cols) - currentConfig.mines) {
                alert("You Win!");
                gameOver = true;
                clearInterval(timerInterval);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = seconds;
            }, 1000);
        }

        // Initialize with Easy
        startGame('easy');
    </script>
</body>
</html>
