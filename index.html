<!DOCTYPE html>
<head>
    <title>minesweeper</title>
    <style>
        body {
            background-color: f5f5f5;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(19, 30px);
            gap: 1px;
            background-color: #777;
            width: max-content;
            margin: 20px auto;
        }
        .cell {
            width: 30px;
            height: 30px;
            background-color: #bbb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="game-board"></div>
    <script>
        const gameBoard = document.getElementById('game-board');

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const cellData = board[y][x];
                const cellDiv = document.createElement('div');
                
                cellDiv.classList.add('cell'); 
                
                // temporarily show mines and counts for testing
                if (cellData.isMine) {
                    cellDiv.textContent = '💣';
                } else if (cellData.neighborCount > 0) {
                    cellDiv.textContent = cellData.neighborCount;
                }
                gameBoard.appendChild(cellDiv);
            }
        }
        
        // mine area size
        const width = 19;
        const height= 10;

        // board keeps track of, well, board
        let board = [];

        // generate the board
        for (let y = 0; y < height; y++) {
            let row = [];
            for (let x = 0; x < width; x++) {
                // random chance to be a mine
                let randomNumber = Math.floor(Math.random() * 10) + 1;
                // if it is a mine, push that
                if (randomNumber === 5) {
                    row.push({
                        x: x,
                        y: y,
                        isMine: true,
                        revealed: false,
                        neighborCount: 0
                    });
                // not a mine, and push it
                } else {
                    row.push({
                        x: x,
                        y: y,
                        isMine: false,
                        revealed: false,
                        neighborCount: 0
                    });
                }
            }
            board.push(row);
        }

        // check every square if it has bombs around it or not
        for (let boardY = 0; boardY < height; boardY++) {
            for (let boardX = 0; boardX < width; boardX++) {
                let neighborCount = 0;
                // if current square is not a bomb
                if (!board[boardY][boardX].isMine) {
                    // check in 3x3 area for bombs
                    for (let x = -1; x < 2; x++) {
                        for (let y = -1; y < 2; y++) {
                            // prevent checking out of bounds areas
                            if (boardX + x >= width || boardX + x < 0 || boardY + y >= height || boardY + y < 0) {
                                continue;
                            }
                            // if the square around current square is bomb, increase neighbor count
                            if (board[boardY + y][boardX + x].isMine) {
                                neighborCount++;
                                // push the neighbor count
                                board[boardY][boardX].neighborCount = neighborCount;
                            }
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
