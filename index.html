<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>minesweeper</title>
    <style>
        :root {
            /* Default Easy Theme Colors */
            --bg-color: #aad751;
            --bg-alt: #a2d149;
            --revealed-bg: #e5c29f;
            --revealed-alt: #d7b899;
            --header-bg: #4a752c;
            --field-border: #578a34;
            --btn-green: #578a34;
            --grass-border: #87af3a;
            --cell-size: 30px;
            --border-thick: 5px;
        }

        /* Difficulty Themes */
        .theme-medium {
            --bg-color: #f1b52b; --bg-alt: #e9ae2a;
            --revealed-bg: #e5c29f; --revealed-alt: #d7b899;
            --header-bg: #bc8d21; --field-border: #a17a1c;
            --btn-green: #a17a1c; --grass-border: #cf9c25;
        }

        .theme-hard {
            --bg-color: #b249f3; --bg-alt: #aa44e9;
            --revealed-bg: #e5c29f; --revealed-alt: #d7b899;
            --header-bg: #8a38bd; --field-border: #752fa1;
            --btn-green: #752fa1; --grass-border: #993ed1;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none !important; 
            user-select: none;
        }

        body, html {
            position: fixed;
            overflow: hidden;
            width: 100%; height: 100%;
            margin: 0;
            background-color: var(--field-border);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }

        #header {
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: var(--header-bg);
            color: white;
            font-weight: bold;
            z-index: 50;
        }

        #game-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--field-border);
            overflow: auto;
        }

        #grid {
            display: grid;
            position: relative;
            border: 8px solid var(--field-border);
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            position: relative;
        }

        .dirt { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .dirt.light { background-color: var(--revealed-bg); }
        .dirt.dark { background-color: var(--revealed-alt); }

        .border-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none; border-style: solid;
            border-width: 0; border-color: var(--grass-border);
        }

        .grass {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            transition: transform 0.4s ease-out; transform-origin: center;
        }
        .grass.light { background-color: var(--bg-color); }
        .grass.dark { background-color: var(--bg-alt); }

        .popped {
            transform: scale(0) translateY(calc(var(--cell-size) * 0.3)) rotate(35deg) !important;
            pointer-events: none;
        }

        .cell.selected::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid var(--btn-green); z-index: 40; pointer-events: none;
        }

        .content { 
            position: absolute; z-index: 2; display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; font-weight: 900; font-size: calc(var(--cell-size) * 0.6);
        }

        .n1 { color: #1976d2; } .n2 { color: #388e3c; } .n3 { color: #d32f2f; }
        .n4 { color: #7b1fa2; }

        #action-menu {
            position: absolute; display: none; z-index: 100; pointer-events: none;
            width: var(--cell-size); height: var(--cell-size);
        }

        .menu-btn {
            position: absolute; width: var(--cell-size); height: var(--cell-size);
            background: var(--btn-green); display: flex; align-items: center; 
            justify-content: center; border-radius: 50%; pointer-events: auto;
            font-size: calc(var(--cell-size) * 0.6);
        }

        #btn-dig { bottom: 100%; left: 0; }
        #btn-flag { top: 0; right: 100%; }

        select { padding: 5px; border-radius: 4px; border: none; font-weight: bold; }
        #restart-btn {
            padding: 8px 16px; background: var(--bg-color); border: none; 
            border-radius: 4px; color: var(--header-bg); font-weight: bold;
        }
    </style>
</head>
<body class="theme-easy">

    <div id="header">
        <select id="difficulty-select" onchange="changeDifficulty()">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
        <span id="msg">minesweeper</span>
        <button id="restart-btn" onclick="initGame()">RESTART</button>
    </div>
    
    <div id="game-container">
        <div id="grid"></div>
        <div id="action-menu">
            <div id="btn-dig" class="menu-btn">⛏️</div>
            <div id="btn-flag" class="menu-btn">🚩</div>
        </div>
    </div>

<script>
    const CONFIG = {
        easy: { rows: 8, cols: 10, mines: 10 },
        medium: { rows: 14, cols: 18, mines: 40 },
        hard: { rows: 20, cols: 24, mines: 99 }
    };

    let currentDifficulty = 'easy';
    let ROWS, COLS, MINES;
    let board = [], gameOver = false, minesGenerated = false, selectedCell = null, lastTap = 0;

    const gridEl = document.getElementById('grid');
    const menuEl = document.getElementById('action-menu');

    function changeDifficulty() {
        currentDifficulty = document.getElementById('difficulty-select').value;
        document.body.className = 'theme-' + currentDifficulty;
        initGame();
    }

    function initGame() {
        const conf = CONFIG[currentDifficulty];
        ROWS = conf.rows; COLS = conf.cols; MINES = conf.mines;
        
        board = []; gameOver = false; minesGenerated = false;
        gridEl.innerHTML = ''; menuEl.style.display = 'none'; selectedCell = null;
        document.getElementById('msg').innerText = "minesweeper";
        
        gridEl.style.gridTemplateColumns = `repeat(${COLS}, var(--cell-size))`;
        gridEl.style.gridTemplateRows = `repeat(${ROWS}, var(--cell-size))`;

        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                const container = document.createElement('div');
                container.classList.add('cell');
                const dirt = document.createElement('div');
                dirt.classList.add('dirt', (r+c)%2===0 ? 'light' : 'dark');
                const borderLayer = document.createElement('div');
                borderLayer.classList.add('border-layer');
                const grass = document.createElement('div');
                grass.classList.add('grass', (r+c)%2===0 ? 'light' : 'dark');
                const content = document.createElement('div');
                content.classList.add('content');

                container.append(dirt, borderLayer, grass, content);
                container.addEventListener('pointerup', (e) => handleTap(e, r, c));
                
                board[r][c] = { r, c, isMine: false, revealed: false, flagged: false, 
                                neighborCount: 0, el: container, grass, borderLayer, content };
                gridEl.appendChild(container);
            }
        }
    }

    // [Rest of logic remains identical to original clone...]
    function handleTap(e, r, c) {
        if (gameOver) return;
        const cell = board[r][c];
        const now = Date.now();
        if (now - lastTap < 300 && cell.revealed) { handleChord(r, c); return; }
        lastTap = now;
        if (!minesGenerated) { generateMines(r, c); dig(r, c); return; }
        if (cell.flagged) { toggleFlag(r, c); clearSelection(); return; }
        if (cell.revealed) return;
        if (selectedCell) selectedCell.el.classList.remove('selected');
        selectedCell = cell;
        cell.el.classList.add('selected');
        menuEl.style.display = 'block';
        menuEl.style.transform = `translate(${c * 100}%, ${r * 100}%)`;
    }

    function updateBorders() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = board[r][c];
                if (!cell.revealed) { cell.borderLayer.style.borderWidth = '0'; continue; }
                const t = (r > 0 && !board[r-1][c].revealed) ? 'var(--border-thick)' : '0';
                const b = (r < ROWS-1 && !board[r+1][c].revealed) ? 'var(--border-thick)' : '0';
                const l = (c > 0 && !board[r][c-1].revealed) ? 'var(--border-thick)' : '0';
                const r_edge = (c < COLS-1 && !board[r][c+1].revealed) ? 'var(--border-thick)' : '0';
                cell.borderLayer.style.borderWidth = `${t} ${r_edge} ${b} ${l}`;
            }
        }
    }

    function dig(r, c) {
        const cell = board[r][c];
        if (cell.revealed || cell.flagged || gameOver) return;
        cell.revealed = true;
        cell.grass.classList.add('popped');
        if (cell.isMine) return endGame(false);
        if (cell.neighborCount > 0) {
            cell.content.innerText = cell.neighborCount;
            cell.content.classList.add('n' + cell.neighborCount);
        } else {
            iterate(r, c, (nr, nc) => dig(nr, nc));
        }
        updateBorders();
        checkWin();
    }

    function toggleFlag(r, c) {
        const cell = board[r][c];
        if (cell.revealed) return;
        cell.flagged = !cell.flagged;
        cell.content.innerText = cell.flagged ? '🚩' : '';
    }

    function generateMines(sr, sc) {
        let p = 0;
        while (p < MINES) {
            let r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
            if (!board[r][c].isMine && (Math.abs(r-sr)>1 || Math.abs(c-sc)>1)) {
                board[r][c].isMine = true; p++;
            }
        }
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isMine) continue;
                let n = 0;
                iterate(r, c, (nr, nc) => { if (board[nr][nc].isMine) n++; });
                board[r][c].neighborCount = n;
            }
        }
        minesGenerated = true;
    }

    function clearSelection() {
        if (selectedCell) selectedCell.el.classList.remove('selected');
        selectedCell = null;
        menuEl.style.display = 'none';
    }

    function iterate(r, c, cb) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                let nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) cb(nr, nc);
            }
        }
    }

    function checkWin() {
        let rev = 0;
        board.flat().forEach(c => { if(c.revealed) rev++; });
        if (rev === (ROWS * COLS) - MINES) endGame(true);
    }

    function endGame(won) {
        gameOver = true;
        clearSelection();
        document.getElementById('msg').innerText = won ? "WIN! 🎉" : "BOOM! 💥";
        board.flat().forEach(c => {
            if (c.isMine) {
                c.grass.classList.add('popped');
                c.content.innerText = '💣';
            }
        });
        updateBorders();
    }

    document.getElementById('btn-dig').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) { dig(selectedCell.r, selectedCell.c); clearSelection(); }
    };

    document.getElementById('btn-flag').onpointerup = (e) => {
        e.stopPropagation();
        if (selectedCell) { toggleFlag(selectedCell.r, selectedCell.c); clearSelection(); }
    };

    window.addEventListener('pointerdown', (e) => {
        if (!menuEl.contains(e.target) && !e.target.closest('.cell')) clearSelection();
    });

    initGame();
</script>
</body>
</html>
